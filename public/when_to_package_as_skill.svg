<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>When to package a workflow as a skill</title>
  <desc>2x2 matrix of repeatability vs cost of error, showing where skills pay off most</desc>
  <defs>
    <style>
      text { font-family: Arial, Helvetica, sans-serif; fill: #2C2C2A; }
      .th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .ts { font-size: 12px; font-weight: 400; fill: #2C2C2A; }
      .axis-label { font-size: 12px; font-weight: 400; fill: #5F5E5A; font-family: Arial, Helvetica, sans-serif; }
      .c-gray rect { fill: #E4E2DA; stroke: #5F5E5A; }
      .c-gray text, .c-gray .th, .c-gray .ts { fill: #2C2C2A; }
      .c-purple rect { fill: #CECBF6; stroke: #534AB7; }
      .c-purple text, .c-purple .th, .c-purple .ts { fill: #26215C; }
      .c-amber rect { fill: #FAC775; stroke: #854F0B; }
      .c-amber text, .c-amber .th, .c-amber .ts { fill: #412402; }
    </style>
  </defs>

  <!-- Axis labels -->
  <text class="axis-label" x="340" y="18" text-anchor="middle">Cost of getting it wrong</text>
  <text class="axis-label" x="62" y="18" text-anchor="middle">Low</text>
  <text class="axis-label" x="618" y="18" text-anchor="middle">High</text>
  <text class="axis-label" x="18" y="195" text-anchor="middle" transform="rotate(-90, 18, 195)">Repeatability</text>
  <text class="axis-label" x="38" y="88" text-anchor="middle">High</text>
  <text class="axis-label" x="38" y="298" text-anchor="middle">Low</text>

  <!-- Grid lines -->
  <line x1="80" y1="30" x2="80" y2="316" stroke="#B4B2A9" stroke-width="0.5"/>
  <line x1="80" y1="30" x2="640" y2="30" stroke="#B4B2A9" stroke-width="0.5"/>
  <line x1="360" y1="30" x2="360" y2="316" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="80" y1="173" x2="640" y2="173" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="640" y1="30" x2="640" y2="316" stroke="#B4B2A9" stroke-width="0.5"/>
  <line x1="80" y1="316" x2="640" y2="316" stroke="#B4B2A9" stroke-width="0.5"/>

  <!-- Q1: High repeat, Low cost -->
  <g class="c-gray">
    <rect x="84" y="34" width="272" height="135" rx="8" stroke-width="0.5"/>
    <text class="th" x="220" y="90" text-anchor="middle" dominant-baseline="central">Maybe later</text>
    <text class="ts" x="220" y="112" text-anchor="middle" dominant-baseline="central">Repeated but low stakes</text>
    <text class="ts" x="220" y="130" text-anchor="middle" dominant-baseline="central">e.g. daily status updates</text>
  </g>

  <!-- Q2: High repeat, High cost -->
  <g class="c-purple">
    <rect x="364" y="34" width="272" height="135" rx="8" stroke-width="1"/>
    <text class="th" x="500" y="80" text-anchor="middle" dominant-baseline="central">Package it</text>
    <text class="ts" x="500" y="102" text-anchor="middle" dominant-baseline="central">High payoff for skills</text>
    <text class="ts" x="500" y="120" text-anchor="middle" dominant-baseline="central">e.g. quarterly risk reports,</text>
    <text class="ts" x="500" y="138" text-anchor="middle" dominant-baseline="central">compliance audits, code review</text>
  </g>

  <!-- Q3: Low repeat, Low cost -->
  <g class="c-gray">
    <rect x="84" y="177" width="272" height="135" rx="8" stroke-width="0.5"/>
    <text class="th" x="220" y="233" text-anchor="middle" dominant-baseline="central">Skip</text>
    <text class="ts" x="220" y="255" text-anchor="middle" dominant-baseline="central">One-off, low stakes</text>
    <text class="ts" x="220" y="273" text-anchor="middle" dominant-baseline="central">e.g. ad-hoc research notes</text>
  </g>

  <!-- Q4: Low repeat, High cost -->
  <g class="c-amber">
    <rect x="364" y="177" width="272" height="135" rx="8" stroke-width="0.5"/>
    <text class="th" x="500" y="233" text-anchor="middle" dominant-baseline="central">Experiment first</text>
    <text class="ts" x="500" y="255" text-anchor="middle" dominant-baseline="central">High stakes, rare</text>
    <text class="ts" x="500" y="273" text-anchor="middle" dominant-baseline="central">e.g. M&amp;A due diligence</text>
  </g>
</svg>
